        // 新闻数据
        const newsData = [

        // ==================== 工具函数 ====================

        // 生成历史数据
        function generateHistoryData(min, max, days) {
            const data = [];
            let price = (min + max) / 2;
            const now = new Date();
            
            for (let i = days; i >= 0; i--) {
                const date = new Date(now);
                date.setDate(date.getDate() - i);
                
                const change = (Math.random() - 0.48) * (max - min) * 0.05;
                price = Math.max(min, Math.min(max, price + change));
                
                data.push({
                    date: date.toISOString().split('T')[0],
                    price: parseFloat(price.toFixed(2))
                });
            }
            return data;
        }

        // ==================== 热点关联算法 ====================

        class HotspotAnalyzer {
            constructor() {
                this.hotspots = globalHotspots;
            }

            // 计算股票与热点的关联度
            calculateCorrelation(stockSymbol, hotspot) {
                const baseCorrelation = hotspot.correlation[stockSymbol] || 0.1;
                const stock = stocksData[stockSymbol];
                
                // 根据行业匹配度调整
                let sectorMultiplier = 1;
                if (hotspot.sectors.some(s => stock.sector.includes(s))) {
                    sectorMultiplier = 1.5;
                }
                
                // 根据热点影响级别调整
                let impactMultiplier = hotspot.impact === 'high' ? 1.3 : 
                                      hotspot.impact === 'medium' ? 1.0 : 0.7;
                
                return Math.min(1, baseCorrelation * sectorMultiplier * impactMultiplier);
            }

            // 获取股票相关的热点列表
            getRelevantHotspots(stockSymbol) {
                return this.hotspots
                    .map(hotspot => ({
                        ...hotspot,
                        correlationScore: this.calculateCorrelation(stockSymbol, hotspot)
                    }))
                    .filter(h => h.correlationScore > 0.15)
                    .sort((a, b) => b.correlationScore - a.correlationScore)
                    .slice(0, 4);
            }

            // 计算整体风险评分
            calculateRiskScore(stockSymbol) {
                const relevant = this.getRelevantHotspots(stockSymbol);
                if (relevant.length === 0) return 30;
                
                const weightedRisk = relevant.reduce((sum, h) => {
                    const impactWeight = h.impact === 'high' ? 1 : h.impact === 'medium' ? 0.6 : 0.3;
                    return sum + (h.correlationScore * impactWeight * 100);
                }, 0);
                
                return Math.min(100, Math.round(weightedRisk / relevant.length));
            }
        }

        // ==================== AI 预测模型 ====================

        class AIPredictionModel {
            constructor() {
                this.hotspotAnalyzer = new HotspotAnalyzer();
            }

            // 技术分析评分
            calculateTechnicalScore(stock) {
                const history = stock.history;
                const prices = history.map(h => h.price);
                const current = prices[prices.length - 1];
                const avg20 = prices.slice(-20).reduce((a, b) => a + b, 0) / 20;
                const avg5 = prices.slice(-5).reduce((a, b) => a + b, 0) / 5;
                
                // 趋势方向
                const trend = avg5 > avg20 ? 1 : -1;
                const trendStrength = Math.abs(avg5 - avg20) / avg20;
                
                // 波动性
                const volatility = this.calculateVolatility(prices);
                
                // 综合评分 (0-100)
                let score = 50 + (trend * trendStrength * 1000);
                score -= volatility * 20; // 高波动扣分
                
                return Math.max(0, Math.min(100, score));
            }

            // 计算波动率
            calculateVolatility(prices) {
                const returns = [];
                for (let i = 1; i < prices.length; i++) {
                    returns.push((prices[i] - prices[i-1]) / prices[i-1]);
                }
                const mean = returns.reduce((a, b) => a + b, 0) / returns.length;
                const variance = returns.reduce((sum, r) => sum + Math.pow(r - mean, 2), 0) / returns.length;
                return Math.sqrt(variance);
            }

            // 基本面评分
            calculateFundamentalScore(stock) {
                // 模拟基本面分析
                const sectorMultiplier = {
                    '科技': 1.1,
                    '半导体': 1.2,
                    '汽车': 0.9,
                    '电商': 0.85,
                    '加密货币': 0.7
                };
                
                const baseScore = 70;
                const multiplier = sectorMultiplier[stock.sector] || 1;
                return Math.min(100, baseScore * multiplier);
            }

            // 情绪分析评分
            calculateSentimentScore(stock) {
                // 基于新闻和热点计算市场情绪
                const relevantNews = newsData.filter(n => 
                    n.tags.some(t => t === Object.keys(stocksData).find(k => stocksData[k] === stock))
                );
                
                if (relevantNews.length === 0) return 50;
                
                const positiveCount = relevantNews.filter(n => n.sentiment === 'positive').length;
                return (positiveCount / relevantNews.length) * 100;
            }

            // 综合预测
            predict(stockSymbol) {
                const stock = stocksData[stockSymbol];
                
                // 各维度评分
                const technical = this.calculateTechnicalScore(stock);
                const fundamental = this.calculateFundamentalScore(stock);
                const sentiment = this.calculateSentimentScore(stock);
                const risk = this.hotspotAnalyzer.calculateRiskScore(stockSymbol);
                
                // 加权综合评分
                const weights = {
                    technical: 0.3,
                    fundamental: 0.25,
                    sentiment: 0.2,
                    risk: -0.25 // 风险是负向指标
                };
                
                const compositeScore = 
                    technical * weights.technical +
                    fundamental * weights.fundamental +
                    sentiment * weights.sentiment +
                    (100 - risk) * Math.abs(weights.risk);
                
                // 生成预测
                let recommendation, confidence, predictedRange;
                
                if (compositeScore >= 70) {
                    recommendation = 'buy';
                    confidence = Math.min(95, compositeScore);
                    predictedRange = { min: 5, max: 15 };
                } else if (compositeScore >= 45) {
                    recommendation = 'hold';
                    confidence = 50 + Math.abs(compositeScore - 57.5);
                    predictedRange = { min: -3, max: 8 };
                } else {
                    recommendation = 'sell';
                    confidence = Math.min(95, 100 - compositeScore);
                    predictedRange = { min: -15, max: -2 };
                }
                
                // 根据波动率调整预测区间
                const volatility = this.calculateVolatility(stock.history.map(h => h.price));
                const volatilityFactor = 1 + volatility * 10;
                predictedRange.min = parseFloat((predictedRange.min * volatilityFactor).toFixed(1));
                predictedRange.max = parseFloat((predictedRange.max * volatilityFactor).toFixed(1));
                
                return {
                    recommendation,
                    confidence: Math.round(confidence),
                    predictedRange,
                    scores: {
                        technical: Math.round(technical),
                        fundamental: Math.round(fundamental),
                        sentiment: Math.round(sentiment),
                        risk: Math.round(risk),
                        composite: Math.round(compositeScore)
                    }
                };
            }

            // 生成未来预测价格
            generateFuturePrediction(stockSymbol, days = 7) {
                const stock = stocksData[stockSymbol];
                const prediction = this.predict(stockSymbol);
                const lastPrice = stock.history[stock.history.length - 1].price;
                
                const futureData = [];
                const now = new Date();
                
                // 基于预测区间生成价格路径
                const avgChange = (prediction.predictedRange.min + prediction.predictedRange.max) / 2 / 100;
                const dailyChange = avgChange / days;
                
                let predictedPrice = lastPrice;
                
                for (let i = 1; i <= days; i++) {
                    const date = new Date(now);
                    date.setDate(date.getDate() + i);
                    
                    // 添加随机波动
                    const randomFactor = (Math.random() - 0.5) * 0.02;
                    predictedPrice = predictedPrice * (1 + dailyChange + randomFactor);
                    
                    futureData.push({
                        date: date.toISOString().split('T')[0],
                        price: parseFloat(predictedPrice.toFixed(2)),
                        isPrediction: true
                    });
                }
                
                return futureData;
            }
        }

        // ==================== UI 渲染 ====================

        const aiModel = new AIPredictionModel();
        const hotspotAnalyzer = new HotspotAnalyzer();

        // 渲染股票选择器
        function renderStockSelector() {
            const grid = document.getElementById('stockGrid');
            grid.innerHTML = Object.entries(stocksData).map(([symbol, data]) => `
                <div class="stock-card ${symbol === currentStock ? 'active' : ''}" onclick="selectStock('${symbol}')">
                    <div class="symbol">${symbol}</div>
                    <div class="name">${data.name}</div>
                </div>
            `).join('');
        }

        // 选择股票
        function selectStock(symbol) {
            currentStock = symbol;
            renderStockSelector();
            updateAnalysis();
        }

        // 更新分析结果
        function updateAnalysis() {
            renderPrediction();
            renderHotspots();
            renderNews();
            updateCharts();
        }

        // 渲染 AI 预测
        function renderPrediction() {
            const result = aiModel.predict(currentStock);
            const container = document.getElementById('predictionResult');
            
            const recommendationText = {
                'buy': '买入',
                'hold': '观望',
                'sell': '卖出'
            };
            
            container.innerHTML = `
                <div class="recommendation ${result.recommendation}">
                    ${recommendationText[result.recommendation]}
                </div>
                <div class="confidence">AI 置信度: ${result.confidence}%</div>
                <div class="prediction-range">
                    <div class="range-item">
                        <div class="label">预测涨幅区间</div>
                        <div class="value ${result.predictedRange.min >= 0 ? 'positive' : 'negative'}">
                            ${result.predictedRange.min > 0 ? '+' : ''}${result.predictedRange.min}%
                        </div>
                    </div>
                    <div class="range-item">
                        <div class="label">至</div>
                        <div class="value ${result.predictedRange.max >= 0 ? 'positive' : 'negative'}">
                            ${result.predictedRange.max > 0 ? '+' : ''}${result.predictedRange.max}%
                        </div>
                    </div>
                </div>
            `;
            
            // 渲染因子评分
            const factorsGrid = document.getElementById('factorsGrid');
            factorsGrid.innerHTML = `
                <div class="factor-item">
                    <div class="label">技术面</div>
                    <div class="score ${result.scores.technical >= 60 ? 'positive' : result.scores.technical >= 40 ? 'neutral' : 'negative'}">${result.scores.technical}</div>
                </div>
                <div class="factor-item">
                    <div class="label">基本面</div>
                    <div class="score ${result.scores.fundamental >= 60 ? 'positive' : result.scores.fundamental >= 40 ? 'neutral' : 'negative'}">${result.scores.fundamental}</div>
                </div>
                <div class="factor-item">
                    <div class="label">情绪面</div>
                    <div class="score ${result.scores.sentiment >= 60 ? 'positive' : result.scores.sentiment >= 40 ? 'neutral' : 'negative'}">${result.scores.sentiment}</div>
                </div>
            `;
        }

        // 渲染热点关联
        function renderHotspots() {
            const hotspots = hotspotAnalyzer.getRelevantHotspots(currentStock);
            const container = document.getElementById('hotspotList');
            
            container.innerHTML = hotspots.map(h => `
                <div class="hotspot-item ${h.impact}">
                    <div class="hotspot-header">
                        <span class="hotspot-title">${h.title}</span>
                        <span class="hotspot-impact ${h.impact}">
                            ${h.impact === 'high' ? '高影响' : h.impact === 'medium' ? '中影响' : '低影响'}
                        </span>
                    </div>
                    <div class="hotspot-desc">${h.description}</div>
                    <div class="correlation-score">
                        <span>关联度</span>
                        <div class="correlation-bar">
                            <div class="correlation-fill" style="width: ${h.correlationScore * 100}%; background: ${h.correlationScore > 0.6 ? '#ff4757' : h.correlationScore > 0.3 ? '#ffd700' : '#00ff88'}"></div>
                        </div>
                        <span>${Math.round(h.correlationScore * 100)}%</span>
                    </div>
                </div>
            `).join('');
        }

        // 渲染新闻
        function renderNews() {
            const container = document.getElementById('newsList');
            container.innerHTML = newsData.map(news => `
                <div class="news-item">
                    <div class="news-time">${news.time}</div>
                    <div class="news-title">${news.title}</div>
                    <div class="news-tags">
                        ${news.tags.map(tag => `<span class="news-tag">${tag}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        // 更新图表
        function updateCharts() {
            updateTrendChart();
            updateRadarChart();
        }

        // 更新趋势图
        function updateTrendChart() {
            const ctx = document.getElementById('trendChart').getContext('2d');
            const stock = stocksData[currentStock];
            const futureData = aiModel.generateFuturePrediction(currentStock);
            
            const historyData = stock.history.map(h => ({ x: h.date, y: h.price }));
            const predictionData = futureData.map(h => ({ x: h.date, y: h.price }));
            
            // 连接历史最后一个点和预测第一个点
            const lastHistory = historyData[historyData.length - 1];
            predictionData.unshift(lastHistory);
            
            if (trendChart) {
                trendChart.destroy();
            }
            
            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [
                        {
                            label: '历史价格',
                            data: historyData,
                            borderColor: '#00d4ff',
                            backgroundColor: 'rgba(0, 212, 255, 0.1)',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0,
                            pointHoverRadius: 6
                        },
                        {
                            label: 'AI 预测',
                            data: predictionData,
                            borderColor: '#7b2cbf',
                            backgroundColor: 'rgba(123, 44, 191, 0.1)',
                            borderDash: [5, 5],
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0,
                            pointHoverRadius: 6
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        intersect: false,
                        mode: 'index'
                    },
                    plugins: {
                        legend: {
                            labels: { color: '#fff' }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0,0,0,0.8)',
                            titleColor: '#fff',
                            bodyColor: '#fff',
                            borderColor: 'rgba(255,255,255,0.1)',
                            borderWidth: 1
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                unit: 'day',
                                displayFormats: {
                                    day: 'MM-dd'
                                }
                            },
                            grid: {
                                color: 'rgba(255,255,255,0.05)'
                            },
                            ticks: {
                                color: '#888'
                            }
                        },
                        y: {
                            grid: {
                                color: 'rgba(255,255,255,0.05)'
                            },
                            ticks: {
                                color: '#888'
                            }
                        }
                    }
                }
            });
        }

        // 更新雷达图
        function updateRadarChart() {
            const ctx = document.getElementById('radarChart').getContext('2d');
            const prediction = aiModel.predict(currentStock);
            const scores = prediction.scores;
            
            if (radarChart) {
                radarChart.destroy();
            }
            
            radarChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['技术面', '基本面', '情绪面', '风险控制', '综合评分'],
                    datasets: [{
                        label: '评分维度',
                        data: [
                            scores.technical,
                            scores.fundamental,
                            scores.sentiment,
                            100 - scores.risk,
                            scores.composite
                        ],
                        backgroundColor: 'rgba(0, 212, 255, 0.2)',
                        borderColor: '#00d4ff',
                        pointBackgroundColor: '#00d4ff',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: '#00d4ff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 100,
                            grid: {
                                color: 'rgba(255,255,255,0.1)'
                            },
                            pointLabels: {
                                color: '#fff',
                                font: {
                                    size: 12
                                }
                            },
                            ticks: {
                                display: false,
                                stepSize: 20
                            }
                        }
                    }
                }
            });
        }

        // ==================== 初始化 ====================

        document.addEventListener('DOMContentLoaded', () => {
            renderStockSelector();
            updateAnalysis();
        });
    </script>
</body>
</html>
