<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球智能投资中心 - Global Intelligence & Trading Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #050508;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        /* Glass Panel */
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* News Ticker */
        .news-ticker-container {
            background: linear-gradient(90deg, #1a1a2e 0%, #16213e 50%, #1a1a2e 100%);
            border-bottom: 2px solid #e94560;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: 40px;
            display: flex;
            align-items: center;
        }

        .news-label {
            background: #e94560;
            color: white;
            padding: 0 20px;
            height: 100%;
            display: flex;
            align-items: center;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            white-space: nowrap;
        }

        .news-ticker {
            flex: 1;
            overflow: hidden;
            position: relative;
            height: 100%;
        }

        .news-track {
            display: flex;
            animation: scroll 60s linear infinite;
            white-space: nowrap;
            padding: 8px 0;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .news-item {
            display: inline-flex;
            align-items: center;
            padding: 0 30px;
            font-size: 13px;
            color: #cbd5e1;
        }

        .news-item::before {
            content: "▸";
            color: #e94560;
            margin-right: 8px;
        }

        .news-time {
            color: #64748b;
            margin-right: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
        }

        .news-category {
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            margin-right: 10px;
            text-transform: uppercase;
        }

        /* Main Layout */
        .main-container {
            margin-top: 40px;
            display: grid;
            grid-template-columns: 1fr 380px 320px;
            height: calc(100vh - 40px);
        }

        @media (max-width: 1400px) {
            .main-container {
                grid-template-columns: 1fr 350px;
            }
            .right-panel {
                display: none;
            }
        }

        @media (max-width: 1024px) {
            .main-container {
                grid-template-columns: 1fr;
                grid-template-rows: 50vh auto auto;
                overflow-y: auto;
            }
        }

        /* Globe Section */
        .globe-section {
            position: relative;
            background: radial-gradient(ellipse at center, #0a0e27 0%, #000000 100%);
            min-height: 500px;
        }

        #globe-container {
            width: 100%;
            height: 100%;
        }
        
        /* 手机端固定地球位置 */
        @media (max-width: 768px) {
            .globe-section {
                position: sticky;
                top: 40px;
                z-index: 100;
            }
        }

        .globe-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
        }

        .globe-title {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa 0%, #e94560 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .conflict-legend {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }

        .legend-dot.active { background: #ef4444; box-shadow: 0 0 10px #ef4444; }
        .legend-dot.tension { background: #f59e0b; box-shadow: 0 0 10px #f59e0b; }
        .legend-dot.stable { background: #10b981; }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }

        /* Conflict Panel */
        .conflict-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 12px;
            padding: 20px;
            z-index: 100;
        }

        .conflict-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .conflict-title {
            font-size: 14px;
            font-weight: 600;
            color: #e94560;
        }

        .conflict-count {
            background: #ef4444;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        .conflict-list {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .conflict-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            min-width: 200px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .conflict-card:hover {
            background: rgba(233, 69, 96, 0.1);
            border-color: rgba(233, 69, 96, 0.5);
        }

        .conflict-name {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .conflict-location {
            font-size: 11px;
            color: #64748b;
            margin-bottom: 8px;
        }

        .conflict-intensity {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .intensity-bar {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .intensity-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s;
        }

        /* Sidebar */
        .sidebar, .right-panel {
            background: #0f0f1a;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-section {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #64748b;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-title i {
            color: #60a5fa;
        }

        /* Futures Cards */
        .futures-grid {
            display: grid;
            gap: 10px;
        }

        .future-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.8) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            transition: all 0.3s;
        }

        .future-card:hover {
            border-color: rgba(96, 165, 250, 0.5);
            transform: translateX(5px);
        }

        .future-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .future-name {
            font-weight: 600;
            font-size: 14px;
        }

        .future-symbol {
            font-size: 10px;
            color: #64748b;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .future-price {
            font-size: 20px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 5px;
        }

        .future-change {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
        }

        .trend-up { color: #10b981; }
        .trend-down { color: #ef4444; }

        /* Market Summary */
        .market-summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .summary-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .summary-label {
            font-size: 10px;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .summary-value {
            font-size: 16px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Alert Box */
        .alert-box {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2) 0%, rgba(185, 28, 28, 0.1) 100%);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
        }

        .alert-title {
            color: #ef4444;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .alert-title::before {
            content: "";
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .alert-text {
            font-size: 12px;
            color: #cbd5e1;
            line-height: 1.5;
        }

        /* Stock Section */
        .stock-grid {
            display: grid;
            gap: 10px;
        }

        .stock-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.8) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .stock-card:hover {
            border-color: rgba(96, 165, 250, 0.5);
            transform: translateY(-2px);
        }

        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .stock-symbol {
            font-weight: 700;
            font-size: 14px;
        }

        .stock-sector {
            font-size: 10px;
            padding: 2px 6px;
            background: rgba(96, 165, 250, 0.2);
            color: #60a5fa;
            border-radius: 4px;
        }

        .stock-price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .stock-price {
            font-size: 18px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .stock-change {
            font-size: 12px;
            font-weight: 600;
        }

        .stock-score {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .score-bar {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .score-fill {
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, #60a5fa 0%, #a78bfa 100%);
        }

        .score-value {
            font-size: 11px;
            font-weight: 700;
            color: #a78bfa;
            min-width: 35px;
        }

        /* Influencer Section - 移到了右侧 */
        .influencer-section {
            flex: 1;
            overflow-y: auto;
        }

        .influencer-header {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.2) 0%, transparent 100%);
            border-bottom: 1px solid rgba(59, 130, 246, 0.3);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .influencer-label {
            color: #3b82f6;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .influencer-label i {
            animation: pulse-blue 2s infinite;
        }

        @keyframes pulse-blue {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .influencer-list {
            padding: 15px;
        }

        .influencer-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            transition: all 0.3s;
        }

        .influencer-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .influencer-header-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .influencer-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 12px;
            flex-shrink: 0;
            border: 2px solid;
        }

        .influencer-avatar.trump {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            border-color: #fca5a5;
            color: white;
        }

        .influencer-avatar.canchan {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-color: #6ee7b7;
            color: white;
        }

        .influencer-avatar.jiege {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            border-color: #fcd34d;
            color: white;
        }

        .influencer-avatar.dufu {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            border-color: #c4b5fd;
            color: white;
        }

        .influencer-meta {
            flex: 1;
        }

        .influencer-name-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2px;
        }

        .influencer-name {
            font-weight: 700;
            font-size: 13px;
            color: #fbbf24;
        }

        .influencer-platform {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
        }

        .influencer-platform.weibo { color: #e6162d; background: rgba(230, 22, 45, 0.1); }
        .influencer-platform.bilibili { color: #00a1d6; background: rgba(0, 161, 214, 0.1); }
        .influencer-platform.youtube { color: #ff0000; background: rgba(255, 0, 0, 0.1); }
        .influencer-platform.douyin { color: #000000; background: rgba(255, 255, 255, 0.1); }
        .influencer-platform.x { color: #1da1f2; background: rgba(29, 161, 242, 0.1); }

        .influencer-time {
            font-size: 10px;
            color: #64748b;
        }

        .influencer-opinion {
            font-size: 12px;
            color: #cbd5e1;
            line-height: 1.6;
            padding-left: 48px;
            border-left: 2px solid rgba(59, 130, 246, 0.3);
        }

        /* Loading Screen */
        #loading {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }

        .loading-globe {
            width: 100px;
            height: 100px;
            border: 3px solid rgba(96, 165, 250, 0.3);
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #64748b;
            font-size: 14px;
            letter-spacing: 3px;
        }

        /* Tooltip */
        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(233, 69, 96, 0.5);
            border-radius: 8px;
            padding: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
            max-width: 250px;
        }

        .tooltip.show {
            opacity: 1;
        }

        .tooltip-title {
            color: #e94560;
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .tooltip-content {
            font-size: 12px;
            color: #cbd5e1;
            line-height: 1.4;
        }

        /* Tab Navigation */
        .tab-nav {
            display: flex;
            gap: 5px;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.3);
        }

        .tab-btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            border-color: transparent;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Filter Controls */
        .filter-row {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .filter-select {
            flex: 1;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 8px 12px;
            color: #e2e8f0;
            font-size: 12px;
        }

        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ai-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.2) 0%, rgba(236, 72, 153, 0.2) 100%);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 20px;
            font-size: 10px;
            color: #c084fc;
        }
    
        /* 优化响应式布局 */
        .main-container {
            margin-top: 40px;
            display: grid;
            grid-template-columns: 1fr 380px 320px;
            height: calc(100vh - 40px);
            overflow: hidden;
        }

        /* 平板端 */
        @media (max-width: 1400px) {
            .main-container {
                grid-template-columns: 1fr 350px;
            }
            .right-panel {
                display: none;
            }
        }

        /* 手机端优化 */
        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto auto;
                height: auto;
                overflow-y: auto;
                overflow-x: hidden;
            }
            
            .globe-section {
                min-height: 300px;
                height: 40vh;
            }
            
            #globe-container {
                height: 100%;
            }
            
            .center-panel, .right-panel {
                display: block;
                width: 100%;
                height: auto;
                max-height: none;
                overflow: visible;
            }
            
            .panel-content {
                max-height: none;
                overflow: visible;
            }
            
            .conflict-panel {
                position: relative;
                top: auto;
                left: auto;
                margin: 10px;
            }
            
            .globe-overlay {
                position: relative;
                top: auto;
                left: auto;
                margin: 10px;
            }
            
            .globe-title {
                font-size: 18px;
            }
            
            .news-ticker-container {
                position: relative;
                height: auto;
                min-height: 40px;
            }
            
            .main-container {
                margin-top: 0;
            }
        }

        /* 确保内容可见 */
        .panel-content {
            overflow-y: auto;
            max-height: calc(100vh - 100px);
        }

        @media (max-width: 768px) {
            .panel-content {
                max-height: none;
                overflow: visible;
            }
        }

    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading">
        <div class="loading-globe"></div>
        <div class="loading-text">INITIALIZING GLOBAL INTELLIGENCE...</div>
    </div>

    <!-- News Ticker -->
    <div class="news-ticker-container">
        <div class="news-label">
            <i class="fas fa-broadcast-tower mr-2"></i>
            BREAKING
        </div>
        <div class="news-ticker">
            <div class="news-track" id="news-track"></div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Globe Section -->
        <div class="globe-section">
            <div id="globe-container"></div>
            
            <!-- Globe Overlay -->
            <div class="globe-overlay">
                <div class="globe-title">
                    <i class="fas fa-globe-americas mr-2"></i>
                    全球冲突态势
                </div>
                <div class="conflict-legend">
                    <div class="legend-item">
                        <div class="legend-dot active"></div>
                        <span>活跃冲突 (Active Conflict)</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-dot tension"></div>
                        <span>高度紧张 (High Tension)</span>
                    </div>

        // ==================== THREE.JS GLOBE WITH WORLD MAP ====================
        let scene, camera, renderer, globe, markers = [];

        function initGlobe() {
            const container = document.getElementById('globe-container');
            
            // Scene
            scene = new THREE.Scene();
            
            // Camera
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.z = 2.5;

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Globe Group
            globe = new THREE.Group();
            scene.add(globe);

            // Earth Sphere with Real World Map Texture
            const geometry = new THREE.SphereGeometry(1, 128, 128);
            
            // Load real earth texture from NASA/Natural Earth
            const textureLoader = new THREE.TextureLoader();
            const earthTexture = textureLoader.load(
                'https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg',
                function(texture) {
                    console.log('Earth texture loaded successfully');
                },
                undefined,
                function(err) {
                    console.log('Failed to load earth texture, using fallback');
                }
            );
            
            // Also load bump map for terrain detail
            const bumpTexture = textureLoader.load('https://unpkg.com/three-globe/example/img/earth-topology.png');
            
            const material = new THREE.MeshPhongMaterial({
                map: earthTexture,
                bumpMap: bumpTexture,
                bumpScale: 0.05,
                emissive: 0x001133,
                emissiveIntensity: 0.1,
                shininess: 25
            });
            
            const earth = new THREE.Mesh(geometry, material);
            globe.add(earth);

            // Atmosphere glow
            const glowGeometry = new THREE.SphereGeometry(1.08, 64, 64);
            const glowMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    c: { type: "f", value: 0.5 },
                    p: { type: "f", value: 4.0 },
                    glowColor: { type: "c", value: new THREE.Color(0x3b82f6) },
                    viewVector: { type: "v3", value: camera.position }
                },
                vertexShader: `
                    uniform vec3 viewVector;
                    varying float intensity;
                    void main() {
                        vec3 vNormal = normalize(normalMatrix * normal);
                        vec3 vNormel = normalize(normalMatrix * viewVector);
                        intensity = pow(0.55 - dot(vNormal, vNormel), 4.0);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform vec3 glowColor;
                    varying float intensity;
                    void main() {
                        vec3 glow = glowColor * intensity;
                        gl_FragColor = vec4(glow, 1.0);
                    }
                `,
                side: THREE.FrontSide,
                blending: THREE.AdditiveBlending,
                transparent: true
            });
            const atmosphere = new THREE.Mesh(glowGeometry, glowMaterial);
            globe.add(atmosphere);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x333333, 0.5);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 3, 5);
            scene.add(directionalLight);
            
            // Add a blue point light for tech effect
            const pointLight = new THREE.PointLight(0x3b82f6, 0.5, 10);
            pointLight.position.set(-5, 0, 5);
            scene.add(pointLight);

            // Add markers for conflict zones
            addConflictMarkers();

            // Animation
            animate();

            // Handle resize
            window.addEventListener('resize', onWindowResize);
        }

        function latLonToVector3(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            
            const x = -(radius * Math.sin(phi) * Math.cos(theta));
            const z = (radius * Math.sin(phi) * Math.sin(theta));
            const y = (radius * Math.cos(phi));
            
            return new THREE.Vector3(x, y, z);
        }

        function addConflictMarkers() {
            conflictZones.forEach(zone => {
                const position = latLonToVector3(zone.lat, zone.lon, 1.02);
                
                // Marker dot - larger and more visible
                const dotGeometry = new THREE.SphereGeometry(0.035, 32, 32);
                const dotColor = zone.status === 'active' ? 0xef4444 : 0xf59e0b;
                const dotMaterial = new THREE.MeshBasicMaterial({ 
                    color: dotColor,
                    emissive: dotColor,
                    emissiveIntensity: 0.8
                });
                const dot = new THREE.Mesh(dotGeometry, dotMaterial);
                dot.position.copy(position);
                dot.userData = zone;
                globe.add(dot);
                
                // Pulse ring - larger
                const ringGeometry = new THREE.RingGeometry(0.04, 0.055, 64);
                const ringMaterial = new THREE.MeshBasicMaterial({
                    color: dotColor,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.7
                });
                const ring = new THREE.Mesh(ringGeometry, ringMaterial);
                ring.position.copy(position.clone().multiplyScalar(1.015));
                ring.lookAt(new THREE.Vector3(0, 0, 0));
                globe.add(ring);
                
                // Label connector line
                const lineGeometry = new THREE.BufferGeometry().setFromPoints([
                    position.clone().multiplyScalar(1.02),
                    position.clone().multiplyScalar(1.15)
                ]);
                const lineMaterial = new THREE.LineBasicMaterial({ 
                    color: dotColor, 
                    transparent: true, 
                    opacity: 0.5 
                });
                const line = new THREE.Line(lineGeometry, lineMaterial);
                globe.add(line);
                
                // Store for animation
                markers.push({ dot, ring, line, zone, scale: 1, baseScale: 1 + Math.random() * 0.3 });
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Rotate globe
            globe.rotation.y += 0.0005;
            
            // Animate markers
            const time = Date.now() * 0.002;
            markers.forEach((marker, i) => {
                const offset = i * 0.7;
                marker.scale = marker.baseScale + Math.sin(time + offset) * 0.15;
                marker.ring.scale.set(marker.scale, marker.scale, marker.scale);
                marker.ring.material.opacity = 0.9 - (marker.scale - marker.baseScale) * 0.2;
                marker.dot.material.emissiveIntensity = 0.8 + Math.sin(time * 2 + offset) * 0.4;
            });
            
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            const container = document.getElementById('globe-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

                        ${zone.name}
                    </div>
                    <div class="conflict-location">
                        <i class="fas fa-globe-asia mr-1"></i> ${zone.location}
                    </div>
                    <div class="conflict-intensity">
                        <span style="font-size: 10px; color: #64748b;">强度</span>
                        <div class="intensity-bar">
                            <div class="intensity-fill" style="width: ${zone.intensity}%; background: ${zone.status === 'active' ? '#ef4444' : '#f59e0b'}"></div>
                        </div>
                        <span style="font-size: 10px; font-family: monospace;">${zone.intensity}%</span>
                    </div>
                </div>
            `).join('');
        }

        function renderFutures() {
            const container = document.getElementById('futures-grid');
            
            container.innerHTML = futuresData.map(future => `
                <div class="future-card">
                    <div class="future-header">
                        <div class="future-name">${future.name}</div>
                        <div class="future-symbol">${future.symbol}</div>
                    </div>
                    <div class="future-price">${future.price.toFixed(2)}</div>
                    <div class="future-change ${future.trend === 'up' ? 'trend-up' : 'trend-down'}">
                        <i class="fas fa-caret-${future.trend === 'up' ? 'up' : 'down'}"></i>
                        ${future.change > 0 ? '+' : ''}${future.change.toFixed(2)} (${future.changePercent > 0 ? '+' : ''}${future.changePercent.toFixed(2)}%)
                    </div>
                </div>
            `).join('');
        }

        function renderStocks() {
            const container = document.getElementById('stock-grid');
            
            container.innerHTML = stockData.map(stock => `
                <div class="stock-card" onclick="showStockDetail('${stock.symbol}')">
                    <div class="stock-header">
                        <div class="stock-symbol">${stock.symbol}</div>
                        <div class="stock-sector">${stock.sectorName}</div>
                    </div>
                    <div class="stock-price-row">
                        <div class="stock-price">¥${stock.price.toFixed(2)}</div>
                        <div class="stock-change ${stock.change >= 0 ? 'trend-up' : 'trend-down'}">
                            ${stock.change >= 0 ? '+' : ''}${stock.change}%
                        </div>
                    </div>
                    <div class="stock-score">
                        <div class="score-bar">
                            <div class="score-fill" style="width: ${stock.aiScore}%"></div>
                        </div>
                        <div class="score-value">AI ${stock.aiScore}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderCalendar() {
            const container = document.getElementById('economic-calendar');
            
            container.innerHTML = calendarData.map(item => `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05);">
                    <div>
                        <div style="font-weight: 600; margin-bottom: 2px;">${item.event}</div>
                        <div style="font-size: 10px; color: #64748b;">
                            <i class="far fa-clock mr-1"></i>${item.time}
                            <span style="margin-left: 10px; color: ${item.importance === 'high' ? '#ef4444' : '#f59e0b'};">
                                ${item.importance === 'high' ? '● 高' : '● 中'}
                            </span>
                        </div>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-family: monospace; color: #10b981;">${item.forecast}</div>
                        <div style="font-size: 10px; color: #64748b;">前: ${item.previous}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderInfluencers() {
            const container = document.getElementById('influencer-list');
            
            container.innerHTML = influencerData.map(influencer => `
                <div class="influencer-card">
                    <div class="influencer-header-row">
                        <div class="influencer-avatar ${influencer.class}">
                            ${influencer.avatar}
                        </div>
                        <div class="influencer-meta">
                            <div class="influencer-name-row">
                                <span class="influencer-name">${influencer.name}</span>
                                <span class="influencer-platform ${influencer.platformClass}">${influencer.platform}</span>
                            </div>
                            <div class="influencer-time"><i class="far fa-clock mr-1"></i>${influencer.time}</div>
                        </div>
                    </div>
                    <div class="influencer-opinion">${influencer.opinion}</div>
                </div>
            `).join('');
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        function filterStocks() {
            renderStocks();
        }

        function focusOnZone(zoneName) {
            const zone = conflictZones.find(z => z.name === zoneName);
            if (!zone) return;
            
            // Show tooltip with zone info
            showTooltip(zone);
            
            // Rotate globe to show zone
            const targetRotation = -(zone.lon + 180) * (Math.PI / 180) + Math.PI / 2;
            const startRotation = globe.rotation.y;
            const diff = targetRotation - startRotation;
            let progress = 0;
            
            const animateRotation = () => {
                progress += 0.03;
                if (progress >= 1) progress = 1;
                
                globe.rotation.y = startRotation + diff * progress;
                
                if (progress < 1) {
                    requestAnimationFrame(animateRotation);
                }
            };
            animateRotation();
        }

        function showTooltip(zone) {
            const tooltip = document.getElementById('tooltip');
            document.getElementById('tooltip-title').textContent = zone.name;
            document.getElementById('tooltip-content').innerHTML = `
                <div style="margin-bottom: 5px;"><strong>地点:</strong> ${zone.location}</div>
                <div style="margin-bottom: 5px;"><strong>状态:</strong> ${zone.status === 'active' ? '⚠️ 活跃冲突' : '⚡ 高度紧张'}</div>
                <div style="margin-bottom: 5px;"><strong>强度:</strong> ${zone.intensity}%</div>
                <div style="margin-bottom: 5px;"><strong>描述:</strong> ${zone.description}</div>
                ${zone.casualties ? `<div style="margin-bottom: 5px;"><strong>伤亡:</strong> ${zone.casualties}</div>` : ''}
                <div><strong>开始:</strong> ${zone.started}</div>
            `;
            
            tooltip.classList.add('show');
            
            const rect = document.getElementById('globe-container').getBoundingClientRect();
            tooltip.style.left = (rect.width / 2 - 125) + 'px';
            tooltip.style.top = (rect.height / 2) + 'px';
            
            setTimeout(() => tooltip.classList.remove('show'), 5000);
        }

        function showStockDetail(symbol) {
            const stock = stockData.find(s => s.symbol === symbol);
            if (!stock) return;
            
            alert(`股票详情: ${stock.name} (${stock.symbol})\n当前价格: ¥${stock.price}\nAI评分: ${stock.aiScore}\n动量: ${stock.momentum}\n估值: ${stock.value}`);
        }

        // ==================== INITIALIZATION ====================

        window.addEventListener('DOMContentLoaded', () => {
            // Hide loading after 2 seconds
            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading').style.display = 'none';
                }, 500);
            }, 2000);
            
            // Initialize all components
            initGlobe();
            renderNews();
            renderConflicts();
            renderFutures();
            renderStocks();
            renderCalendar();
            renderInfluencers();
            
            // Auto refresh
            setInterval(() => {
                renderNews();
                renderInfluencers();
            }, 60000);
        });
    </script>
