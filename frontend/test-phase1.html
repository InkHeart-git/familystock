<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniRock v2.0 - Phase 1 测试</title>
    <link rel="stylesheet" href="src/styles/variables.css">
    <style>
        body {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .test-section {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: var(--space-lg);
            margin-bottom: var(--space-lg);
            border: 1px solid var(--border-color);
        }
        .test-title {
            font-size: var(--font-xl);
            font-weight: var(--font-bold);
            margin-bottom: var(--space-md);
            color: var(--color-primary);
        }
        .test-item {
            padding: var(--space-sm) 0;
            border-bottom: 1px solid var(--border-color-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .test-item:last-child {
            border-bottom: none;
        }
        .status {
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: var(--font-sm);
            font-weight: var(--font-semibold);
        }
        .status.success {
            background: var(--color-success-light);
            color: var(--color-success);
        }
        .status.error {
            background: var(--color-danger-light);
            color: var(--color-danger);
        }
        .status.pending {
            background: var(--color-warning-light);
            color: var(--color-warning);
        }
        .result-box {
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: var(--space-md);
            margin-top: var(--space-md);
            font-family: var(--font-mono);
            font-size: var(--font-sm);
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .btn {
            background: var(--gradient-primary);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-lg);
            cursor: pointer;
            font-size: var(--font-md);
            font-weight: var(--font-semibold);
            margin-top: var(--space-md);
        }
        .btn:hover {
            opacity: 0.9;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center; margin-bottom: 30px;">🧪 MiniRock v2.0 - Phase 1 测试</h1>

    <!-- 配置测试 -->
    <div class="test-section">
        <div class="test-title">⚙️ 配置系统测试</div>
        <div id="config-tests"></div>
    </div>

    <!-- 工具函数测试 -->
    <div class="test-section">
        <div class="test-title">🛠️ 工具函数测试</div>
        <div id="utils-tests"></div>
    </div>

    <!-- API Client测试 -->
    <div class="test-section">
        <div class="test-title">🔗 API Client 测试</div>
        <div id="api-tests"></div>
        <button class="btn" onclick="testAPI()">测试 API 连通性</button>
        <div id="api-result" class="result-box" style="display: none;"></div>
    </div>

    <!-- 股票API测试 -->
    <div class="test-section">
        <div class="test-title">📈 股票 API 测试</div>
        <div id="stock-tests"></div>
        <button class="btn" onclick="testStockAPI()">测试股票接口</button>
        <div id="stock-result" class="result-box" style="display: none;"></div>
    </div>

    <!-- AI API测试 -->
    <div class="test-section">
        <div class="test-title">🤖 AI API 测试</div>
        <div id="ai-tests"></div>
        <button class="btn" onclick="testAIAPI()">测试 AI 接口</button>
        <div id="ai-result" class="result-box" style="display: none;"></div>
    </div>

    <!-- 加载模块 -->
    <script src="src/config/index.js"></script>
    <script src="src/utils/helpers.js"></script>
    <script src="src/api/client.js"></script>
    <script src="src/api/stock.js"></script>
    <script src="src/api/ai.js"></script>

    <script>
        // 测试状态管理
        const testResults = {
            config: [],
            utils: [],
            api: [],
            stock: [],
            ai: []
        };

        // 渲染测试项
        function renderTestItem(containerId, name, status, message = '') {
            const container = document.getElementById(containerId);
            const statusClass = status === 'success' ? 'success' : status === 'error' ? 'error' : 'pending';
            const statusText = status === 'success' ? '✓ 通过' : status === 'error' ? '✗ 失败' : '⏳ 待测';
            
            const item = document.createElement('div');
            item.className = 'test-item';
            item.innerHTML = `
                <span>${name}</span>
                <span class="status ${statusClass}">${statusText}</span>
            `;
            container.appendChild(item);
            
            if (message) {
                const msg = document.createElement('div');
                msg.style.cssText = 'font-size: 12px; color: var(--text-muted); margin-top: 4px;';
                msg.textContent = message;
                container.appendChild(msg);
            }
        }

        // ========== 配置测试 ==========
        function testConfig() {
            const tests = [
                { name: 'CONFIG 对象存在', test: () => typeof CONFIG !== 'undefined' },
                { name: 'APP 配置', test: () => CONFIG.APP && CONFIG.APP.NAME === 'MiniRock' },
                { name: 'API 基础URL', test: () => CONFIG.API && CONFIG.API.BASE_URL.includes(':8080') },
                { name: 'Tushare Token', test: () => CONFIG.TUSHARE && CONFIG.TUSHARE.TOKEN.length > 0 },
                { name: 'UI 颜色配置', test: () => CONFIG.UI && CONFIG.UI.COLORS.UP === '#ff6b6b' },
                { name: '配置已冻结', test: () => Object.isFrozen(CONFIG) }
            ];

            tests.forEach(({ name, test }) => {
                try {
                    const result = test();
                    renderTestItem('config-tests', name, result ? 'success' : 'error');
                } catch (e) {
                    renderTestItem('config-tests', name, 'error', e.message);
                }
            });
        }

        // ========== 工具函数测试 ==========
        function testUtils() {
            const tests = [
                { 
                    name: 'formatPrice (CNY)', 
                    test: () => Utils.formatPrice(1234.5, 'CNY') === '¥1234.50' 
                },
                { 
                    name: 'formatPrice (USD)', 
                    test: () => Utils.formatPrice(1234.5, 'USD') === '$1234.50' 
                },
                { 
                    name: 'formatChange (+)', 
                    test: () => Utils.formatChange(5.23) === '+5.23%' 
                },
                { 
                    name: 'formatChange (-)', 
                    test: () => Utils.formatChange(-3.14) === '-3.14%' 
                },
                { 
                    name: 'formatVolume (亿)', 
                    test: () => Utils.formatVolume(1234567890) === '12.35亿' 
                },
                { 
                    name: 'formatVolume (万)', 
                    test: () => Utils.formatVolume(123456) === '12.35万' 
                },
                { 
                    name: 'getChangeClass (up)', 
                    test: () => Utils.getChangeClass(1.5) === 'change-up' 
                },
                { 
                    name: 'getChangeClass (down)', 
                    test: () => Utils.getChangeClass(-1.5) === 'change-down' 
                },
                { 
                    name: 'isValidSymbol (600519)', 
                    test: () => Utils.isValidSymbol('600519') === true 
                },
                { 
                    name: 'isValidSymbol (invalid)', 
                    test: () => Utils.isValidSymbol('ABC123') === false 
                },
                {
                    name: 'calculateProfit',
                    test: () => {
                        const result = Utils.calculateProfit(100, 80, 100);
                        return result.profit === 2000 && result.profitPercent === 25;
                    }
                }
            ];

            tests.forEach(({ name, test }) => {
                try {
                    const result = test();
                    renderTestItem('utils-tests', name, result ? 'success' : 'error');
                } catch (e) {
                    renderTestItem('utils-tests', name, 'error', e.message);
                }
            });
        }

        // ========== API Client 初始化测试 ==========
        function testAPIInit() {
            const tests = [
                { name: 'APIClient 类存在', test: () => typeof APIClient !== 'undefined' },
                { name: 'apiClient 实例存在', test: () => typeof apiClient !== 'undefined' },
                { name: 'API Client 方法', test: () => typeof apiClient.get === 'function' },
                { name: '缓存功能', test: () => apiClient.cache instanceof Map }
            ];

            tests.forEach(({ name, test }) => {
                try {
                    const result = test();
                    renderTestItem('api-tests', name, result ? 'success' : 'error');
                } catch (e) {
                    renderTestItem('api-tests', name, 'error', e.message);
                }
            });
        }

        // ========== 股票API 初始化测试 ==========
        function testStockAPIInit() {
            const tests = [
                { name: 'StockAPI 类存在', test: () => typeof StockAPI !== 'undefined' },
                { name: 'stockAPI 实例存在', test: () => typeof stockAPI !== 'undefined' },
                { name: 'getQuote 方法', test: () => typeof stockAPI.getQuote === 'function' },
                { name: 'search 方法', test: () => typeof stockAPI.search === 'function' }
            ];

            tests.forEach(({ name, test }) => {
                try {
                    const result = test();
                    renderTestItem('stock-tests', name, result ? 'success' : 'error');
                } catch (e) {
                    renderTestItem('stock-tests', name, 'error', e.message);
                }
            });
        }

        // ========== AI API 初始化测试 ==========
        function testAIAPIInit() {
            const tests = [
                { name: 'AIAPI 类存在', test: () => typeof AIAPI !== 'undefined' },
                { name: 'aiAPI 实例存在', test: () => typeof aiAPI !== 'undefined' },
                { name: 'analyzeHoldings 方法', test: () => typeof aiAPI.analyzeHoldings === 'function' },
                { name: 'calculateLocalScore 方法', test: () => typeof aiAPI.calculateLocalScore === 'function' }
            ];

            tests.forEach(({ name, test }) => {
                try {
                    const result = test();
                    renderTestItem('ai-tests', name, result ? 'success' : 'error');
                } catch (e) {
                    renderTestItem('ai-tests', name, 'error', e.message);
                }
            });
        }

        // ========== 实际API测试 ==========
        async function testAPI() {
            const resultBox = document.getElementById('api-result');
            resultBox.style.display = 'block';
            resultBox.textContent = '测试中...';

            try {
                // 测试股票接口 (贵州茅台)
                const data = await stockAPI.getQuote('600519');
                resultBox.textContent = `✅ API 测试成功！\n\n股票: 贵州茅台 (600519)\n价格: ${data?.formattedLocal || 'N/A'}\n涨跌: ${data?.pct_chg || 'N/A'}%\n\n完整数据:\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                resultBox.textContent = `❌ API 测试失败:\n${error.message}\n\n注意: 确保后端服务在 8006 端口运行`;
            }
        }

        async function testStockAPI() {
            const resultBox = document.getElementById('stock-result');
            resultBox.style.display = 'block';
            resultBox.textContent = '测试中...';

            try {
                // 批量查询测试
                const stocks = await stockAPI.getBatchQuotes(['600519', '000858', '300750']);
                resultBox.textContent = `✅ 批量查询成功！\n\n获取 ${stocks?.length || 0} 只股票数据\n\n${JSON.stringify(stocks, null, 2)}`;
            } catch (error) {
                resultBox.textContent = `❌ 批量查询失败:\n${error.message}`;
            }
        }

        async function testAIAPI() {
            const resultBox = document.getElementById('ai-result');
            resultBox.style.display = 'block';
            resultBox.textContent = '测试中...';

            try {
                // 本地AI评分计算测试
                const score1 = aiAPI.calculateLocalScore({ pct_chg: 5.5 });
                const score2 = aiAPI.calculateLocalScore({ pct_chg: -3.2 });
                const score3 = aiAPI.calculateLocalScore({ pct_chg: 0.5 });

                resultBox.textContent = `✅ AI 本地评分计算成功！\n\n涨 +5.5% → 评分: ${score1.score} (${score1.recommendation})\n跌 -3.2% → 评分: ${score2.score} (${score2.recommendation})\n涨 +0.5% → 评分: ${score3.score} (${score3.recommendation})\n\n说明: 本地计算无需API调用，基于涨跌幅算法`;
            } catch (error) {
                resultBox.textContent = `❌ AI 测试失败:\n${error.message}`;
            }
        }

        // 初始化测试
        window.onload = function() {
            testConfig();
            testUtils();
            testAPIInit();
            testStockAPIInit();
            testAIAPIInit();
        };
    </script>
</body>
</html>
