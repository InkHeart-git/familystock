<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ministone - 投资模拟游戏</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="stock_database.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <style>
    :root {
      --primary: #1E5F8E;
      --primary-dark: #164A6E;
      --primary-light: #4A8FBF;
      --success: #10B981;
      --warning: #F59E0B;
      --danger: #EF4444;
      --text-primary: #1F2937;
      --text-secondary: #6B7280;
      --text-muted: #9CA3AF;
      --bg-page: #F8FAFC;
      --bg-card: #FFFFFF;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Inter", sans-serif;
      background: linear-gradient(135deg, #1E5F8E 0%, #0d2d44 100%);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }
    
    .page-container {
      max-width: 768px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    
    /* 免责声明弹窗 */
    .disclaimer-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }
    
    .disclaimer-modal.active {
      opacity: 1;
      visibility: visible;
    }
    
    .disclaimer-content {
      background: white;
      border-radius: 24px;
      padding: 36px 32px;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
      transform: scale(0.9) translateY(20px);
      transition: all 0.3s ease;
    }
    
    .disclaimer-modal.active .disclaimer-content {
      transform: scale(1) translateY(0);
    }
    
    .disclaimer-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #FEF3C7 0%, #F59E0B 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 8px 24px rgba(245, 158, 11, 0.3);
    }
    
    .disclaimer-icon svg {
      width: 36px;
      height: 36px;
      color: #92400E;
    }
    
    .disclaimer-title {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      color: var(--text-primary);
      margin-bottom: 20px;
    }
    
    .disclaimer-text {
      font-size: 15px;
      line-height: 1.9;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 28px;
    }
    
    .disclaimer-text strong {
      color: var(--danger);
      font-weight: 600;
    }
    
    .disclaimer-btn {
      width: 100%;
      padding: 16px 28px;
      background: linear-gradient(135deg, #1E5F8E 0%, #164A6E 100%);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 8px 24px rgba(30, 95, 142, 0.3);
    }
    
    .disclaimer-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(30, 95, 142, 0.4);
    }
    
    .disclaimer-footer {
      margin-top: 18px;
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
    }
    
    /* 主页头部 */
    .home-header {
      padding: 60px 32px 40px;
      color: white;
      text-align: center;
    }
    
    .app-logo {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 100%);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    
    .app-logo svg {
      width: 52px;
      height: 52px;
      color: white;
    }
    
    .app-title {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    
    .app-subtitle {
      font-size: 16px;
      opacity: 0.75;
      font-weight: 400;
    }
    
    /* 游戏入口区域 */
    .game-section {
      flex: 1;
      padding: 0 24px 32px;
    }
    
    .game-card {
      background: linear-gradient(135deg, #667EEA 0%, #764BA2 100%);
      border-radius: 24px;
      padding: 32px;
      margin-bottom: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 12px 40px rgba(102, 126, 234, 0.35);
      position: relative;
      overflow: hidden;
    }
    
    .game-card::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -30%;
      width: 200px;
      height: 200px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
    }
    
    .game-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 56px rgba(102, 126, 234, 0.45);
    }
    
    .game-card-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }
    
    .game-icon {
      width: 72px;
      height: 72px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
    }
    
    .game-icon svg {
      width: 36px;
      height: 36px;
      color: white;
    }
    
    .game-title-wrap {
      flex: 1;
      color: white;
    }
    
    .game-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .game-badge {
      font-size: 12px;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.25);
      padding: 4px 12px;
      border-radius: 20px;
      backdrop-filter: blur(4px);
    }
    
    .game-desc {
      font-size: 14px;
      opacity: 0.9;
      line-height: 1.5;
    }
    
    .game-features {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }
    
    .game-feature {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      padding: 10px 16px;
      border-radius: 12px;
      font-size: 13px;
      color: white;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .game-arrow {
      position: absolute;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
    }
    
    .game-arrow svg {
      width: 24px;
      height: 24px;
      color: white;
    }
    
    .game-card:hover .game-arrow {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-50%) translateX(4px);
    }
    
    /* 功能入口 */
    .features-section {
      background: white;
      border-radius: 24px 24px 0 0;
      padding: 32px 24px;
      margin-top: auto;
    }
    
    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    
    .feature-card {
      background: var(--bg-page);
      border-radius: 16px;
      padding: 24px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }
    
    .feature-card:hover {
      background: white;
      border-color: var(--primary-light);
      box-shadow: 0 8px 24px rgba(30, 95, 142, 0.12);
      transform: translateY(-2px);
    }
    
    .feature-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
    }
    
    .feature-icon.blue {
      background: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%);
    }
    
    .feature-icon.green {
      background: linear-gradient(135deg, #10B981 0%, #059669 100%);
    }
    
    .feature-icon.purple {
      background: linear-gradient(135deg, #8B5CF6 0%, #6D28D9 100%);
    }
    
    .feature-icon.orange {
      background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
    }
    
    .feature-icon svg {
      width: 28px;
      height: 28px;
      color: white;
    }
    
    .feature-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    
    .feature-desc {
      font-size: 12px;
      color: var(--text-muted);
    }
    
    /* 底部信息 */
    .footer-info {
      background: white;
      padding: 20px 24px 40px;
      text-align: center;
    }
    
    .risk-notice {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.8;
      padding: 16px;
      background: #FEF3C7;
      border-radius: 12px;
      margin-bottom: 16px;
    }
    
    .copyright {
      font-size: 12px;
      color: var(--text-muted);
    }
    
    /* Toast 提示 */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1F2937;
      color: white;
      padding: 14px 28px;
      border-radius: 14px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s;
      z-index: 1000;
    }
    
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    
    /* 动画 */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    .animate-float {
      animation: float 3s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <!-- 免责声明弹窗 -->
  <div class="disclaimer-modal active" id="disclaimerModal">
    <div class="disclaimer-content">
      <div class="disclaimer-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
          <line x1="12" y1="9" x2="12" y2="13"></line>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
      </div>
      <h2 class="disclaimer-title">🎮 风险提示</h2>
      <p class="disclaimer-text">
        本网站为<strong>投资模拟游戏</strong>，所有数据仅供学习参考。<br><br>
        请勿将游戏内容作为真实投资依据，因参考本网站信息而进行的投资决策所产生的后果，均由用户本人承担。
      </p>
      <button class="disclaimer-btn" onclick="closeDisclaimer()">
        我已知晓，进入游戏
      </button>
      <p class="disclaimer-footer">点击按钮即表示您同意本声明</p>
    </div>
  </div>

  <div class="page-container">
    <!-- 主页头部 -->
    <div class="home-header">
      <div class="app-logo animate-float">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
        </svg>
      </div>
      <h1 class="app-title">ministone</h1>
      <p class="app-subtitle">投资模拟游戏 · 零风险体验投资乐趣</p>
    </div>

    <!-- 游戏入口 -->
    <div class="game-section">
      <div class="game-card" onclick="enterGame()">
        <div class="game-card-header">
          <div class="game-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
              <polyline points="17 6 23 6 23 12"></polyline>
            </svg>
          </div>
          <div class="game-title-wrap">
            <div class="game-title">
              开始投资模拟
              <span class="game-badge">模拟游戏</span>
            </div>
            <div class="game-desc">虚拟资金实战演练，学习投资策略</div>
          </div>
        </div>
        <div class="game-features">
          <div class="game-feature">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            自选股管理
          </div>
          <div class="game-feature">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            持仓模拟
          </div>
          <div class="game-feature">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            AI诊断分析
          </div>
          <div class="game-feature">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            组合分析
          </div>
        </div>
        <div class="game-arrow">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </div>
      </div>
    </div>

    <!-- 功能入口 -->
    <div class="features-section">
      <h2 class="section-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
        更多功能
      </h2>
      
      <div class="feature-grid">
        <div class="feature-card" onclick="goToPortfolio()">
          <div class="feature-icon blue">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
            </svg>
          </div>
          <div class="feature-title">我的持仓</div>
          <div class="feature-desc">查看模拟持仓</div>
        </div>
        
        <div class="feature-card" onclick="goToStocks()">
          <div class="feature-icon green">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
            </svg>
          </div>
          <div class="feature-title">自选股</div>
          <div class="feature-desc">管理关注股票</div>
        </div>
        
        <div class="feature-card" onclick="goToAnalysis()">
          <div class="feature-icon purple">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path>
              <path d="M22 12A10 10 0 0 0 12 2v10z"></path>
            </svg>
          </div>
          <div class="feature-title">组合分析</div>
          <div class="feature-desc">AI智能分析</div>
        </div>
        
        <div class="feature-card" onclick="goToMarket()">
          <div class="feature-icon orange">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="1" x2="12" y2="23"></line>
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
            </svg>
          </div>
          <div class="feature-title">市场行情</div>
          <div class="feature-desc">实时股票行情</div>
        </div>
      </div>
    </div>

    <!-- 底部信息 -->
    <div class="footer-info">
      <div class="risk-notice">
        ⚠️ 本网站为投资模拟游戏，所有数据仅供学习参考，不构成任何投资建议
      </div>
      <div class="copyright">
        © 2026 ministone · 投资模拟游戏
      </div>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div class="toast" id="toast"></div>

  <script>
    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      
      // 检查是否已经同意免责声明
      if (localStorage.getItem('disclaimerAgreed') === 'true') {
        closeDisclaimer();
      }
    });
    
    // 关闭免责声明弹窗
    function closeDisclaimer() {
      const modal = document.getElementById('disclaimerModal');
      modal.classList.remove('active');
      localStorage.setItem('disclaimerAgreed', 'true');
    }
    
    // 进入游戏主界面
    function enterGame() {
      // 跳转到投资模拟页面
      window.location.href = '/portfolio.html';
    }
    
    // 进入我的持仓
    function goToPortfolio() {
      window.location.href = '/portfolio.html';
    }
    
    // 进入自选股
    function goToStocks() {
      window.location.href = '/watchlist.html';
    }
    
    // 进入组合分析
    function goToAnalysis() {
      window.location.href = '/portfolio-analysis.html';
    }
    
    // 进入市场行情
    function goToMarket() {
      window.location.href = '/market.html';
    }
    
    // 显示Toast提示
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }
  </script>
</body>
</html>
